<section>
    <div class="header-rps-card">

        <div class="header-rps-title">
            <h3 class="mb-0 fw-bold">
                <ion-icon name="document-text-outline"></ion-icon>
                Header RPS
            </h3>
        </div>

        <div class="header-rps-body">

            <form>
                <label>Nama Perguruan Tinggi</label>
                <input type="text" placeholder="Masukkan Nama Perguruan Tinggi">

                <label>Fakultas</label>
                <input type="text" placeholder="Masukkan Nama Fakultas">

                <label>Program Studi</label>
                <input type="text" placeholder="Masukkan Program Studi">

                <div class="form-row">
                    <div class="form-group">
                        <label>Nama Mata Kuliah</label>
                        <input type="text" placeholder="Masukkan Nama Mata Kuliah">
                    </div>

                    <div class="form-group">
                        <label>Kode Mata Kuliah</label>
                        <input type="text" placeholder="Contoh: IF123">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Semester</label>
                        <input type="text" placeholder="Contoh: Ganjil">
                    </div>

                    <div class="form-group">
                        <label>Tahun Akademik</label>
                        <input type="text" placeholder="2025/2026">
                    </div>
                </div>

                <label>Upload Logo Kampus</label>
                <input type="file">

                <button type="submit" class="btn-simpan">
                    Simpan
                </button>
            </form>

        </div>

    </div>

</section>
